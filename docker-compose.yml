version: '3'
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - '5672:5672'
      - '15672:15672'
  product-db:
    image: postgres:15
    container_name: product-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: product
    ports:
      - '5433:5432'
    volumes:
      - product_data:/var/lib/postgresql/data

volumes:
  product_data:
